name: Build Windows EXE

# Build manually from the Actions tab, or automatically when you push a vX.Y.Z tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Lets the workflow's GITHUB_TOKEN create the GitHub Release (otherwise it's
# read-only and "Attach to release" fails with a 403 "Resource not accessible").
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller circlewave.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircleWave-windows
          path: dist/CircleWave.exe

      # When triggered by a version tag, also publish a GitHub Release with the exe attached.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CircleWave.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
